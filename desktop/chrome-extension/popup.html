<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root { color-scheme: light dark; }
      body {
        font: 13px/1.4 -apple-system, "Segoe UI", system-ui, sans-serif;
        margin: 0; padding: 16px; width: 240px;
      }
      h1 { font-size: 14px; margin: 0 0 4px; }
      p.sub { margin: 0 0 12px; opacity: 0.7; }
      button {
        width: 100%; padding: 9px 12px; font-size: 13px; font-weight: 600;
        border: 0; border-radius: 8px; cursor: pointer;
        background: #2563eb; color: #fff;
      }
      button:disabled { opacity: 0.6; cursor: default; }
      #status { margin-top: 10px; min-height: 18px; opacity: 0.85; }
      #status.err { color: #dc2626; }
    </style>
  </head>
  <body>
    <h1>TabBridge</h1>
    <p class="sub">Open the Safari tabs sent from your phone.</p>
    <button id="open">Open tabs from phone</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
